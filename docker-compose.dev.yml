services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boat
      POSTGRES_PASSWORD: boat
      POSTGRES_DB: boat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boat"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://boat:boat@db:5432/boat
      SECRET_KEY: dev-secret-key-change-in-production
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
