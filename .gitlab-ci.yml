stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ---------- Lint ----------

lint-backend:
  stage: lint
  image: python:3.12-slim
  cache:
    key: pip
    paths:
      - .cache/pip
  before_script:
    - pip install ruff
  script:
    - ruff check backend/app/
    - ruff format --check backend/app/

lint-frontend:
  stage: lint
  image: node:22-slim
  cache:
    key: npm
    paths:
      - .cache/npm
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci
  script:
    - npm run check

# ---------- Test ----------

test-backend:
  stage: test
  image: python:3.12-slim
  cache:
    key: pip
    paths:
      - .cache/pip
  before_script:
    - cd backend
    - pip install uv
    - uv pip install --system -e ".[dev]"
  script:
    - python -m pytest tests/ -v --tb=short
  coverage: '/^TOTAL\s+\d+\s+\d+\s+(\d+%)/'

test-frontend-build:
  stage: test
  image: node:22-slim
  cache:
    key: npm
    paths:
      - .cache/npm
      - frontend/node_modules/
  before_script:
    - cd frontend && npm ci
  script:
    - npm run build

# ---------- Build ----------

build-backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/backend:latest" backend/
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/frontend:latest" frontend/
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
